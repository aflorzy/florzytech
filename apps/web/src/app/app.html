<mat-sidenav-container>
  <mat-sidenav #drawer class="sidenav" mode="over" position="end">
    <mat-toolbar color="primary" class="nav-header">
      <button type="button" aria-label="Toggle sidenav" matButton (click)="drawer.toggle()">
        <mat-icon aria-label="Side nav close icon">menu</mat-icon>
      </button>
    </mat-toolbar>

    <div class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
        >Home</a
      >
      <a routerLink="about" routerLinkActive="active">About</a>
      <a routerLink="contact" routerLinkActive="active">Contact</a>
      <a routerLink="faq" routerLinkActive="active">FAQ</a>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="nav">
      <div class="brand">
        <img src="assets/logo.png" alt="Rawr" />

        <span>{{ company.shortName }}</span>
      </div>

      <span class="spacer"></span>

      <a class="github-link" href="https://github.com/aflorzy/florzytech" target="_blank" rel="noopener" aria-label="View source on GitHub">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="22" height="22" aria-hidden="true">
          <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </a>

      <button type="button" aria-label="Toggle sidenav" matButton (click)="drawer.toggle()">
        <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
      </button>
    </mat-toolbar>

    <div class="route-wrapper">
      <router-outlet></router-outlet>
    </div>

    <mat-toolbar color="primary" class="footer">
      <footer class="site-footer">
        <div class="inner">
          <div class="links">
            <a [href]="company.socials['facebook']" target="_blank" rel="noopener">Facebook</a>
            <a [href]="company.socials['google']" target="_blank" rel="noopener">Google</a>
            <a [href]="'mailto:' + company.email">Email</a>
            <a [href]="'tel:+1' + company.phone">Call/Text</a>
          </div>
          <div class="copyright">© {{ currentYear }} {{ company.fullName }}</div>
        </div>
      </footer>
    </mat-toolbar>
  </mat-sidenav-content>
</mat-sidenav-container>
