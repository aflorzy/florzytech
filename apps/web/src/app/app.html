<a class="skip-link" href="#main-content">Skip to main content</a>

<mat-sidenav-container>
  <mat-sidenav #drawer class="sidenav" mode="over" position="end">
    <mat-toolbar color="primary" class="nav-header">
      <button type="button" aria-label="Toggle sidenav" matButton (click)="drawer.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
    </mat-toolbar>

    <nav aria-label="Site navigation">
      <div class="nav-links">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
          >Home</a
        >
        <a routerLink="/about" routerLinkActive="active">About</a>
        <a routerLink="/contact" routerLinkActive="active">Contact</a>
        <a routerLink="/faq" routerLinkActive="active">FAQ</a>
      </div>
    </nav>
  </mat-sidenav>

  <mat-sidenav-content>
    <header>
      <mat-toolbar color="primary" class="nav">
        <a routerLink="/" class="brand">
          <img src="assets/logo.png" alt="Florzy Tech LLC - PS5 Repair" />
          <span>{{ company.shortName }}</span>
        </a>

        <nav class="desktop-nav" aria-label="Desktop navigation">
          <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
          <a routerLink="/about" routerLinkActive="active">About</a>
          <a routerLink="/faq" routerLinkActive="active">FAQ</a>
          <a routerLink="/contact" routerLinkActive="active">Contact</a>
        </nav>

        <span class="spacer"></span>

        <a href="tel:+13202678431" class="cta-tel" aria-label="Call Florzy Tech: (320) 267-8431">
          <mat-icon>phone</mat-icon>
          <span class="cta-tel-text">Call Us</span>
        </a>

        <button type="button" aria-label="Toggle sidenav" matButton (click)="drawer.toggle()" class="menu-button">
          <mat-icon>menu</mat-icon>
        </button>
      </mat-toolbar>
    </header>

    <main id="main-content">
      <div class="route-wrapper">
        <router-outlet></router-outlet>
      </div>
    </main>

    <footer>
      <mat-toolbar color="primary" class="footer">
        <div class="site-footer">
          <div class="inner">
            <div class="links">
              <a [href]="company.socials['facebook']" target="_blank" rel="noopener">Facebook</a>
              <a [href]="company.socials['google']" target="_blank" rel="noopener">Google</a>
              <a [href]="'mailto:' + company.email">Email</a>
              <a [href]="'tel:+1' + company.phone">Call/Text</a>
            </div>
            <div class="copyright">© {{ currentYear }} {{ company.fullName }}</div>
          </div>
        </div>
      </mat-toolbar>
    </footer>
  </mat-sidenav-content>
</mat-sidenav-container>
