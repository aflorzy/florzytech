<mat-card class="page contact">
  <mat-card-title>Contact</mat-card-title>
  <mat-card-content>
    <mat-list>
      <mat-list-item>
        <mat-icon matListItemIcon>phone</mat-icon>
        <div matListItemTitle>Phone</div>
        <div matListItemLine>
          <a mat-button [href]="'tel:+1' + companyDetails.phone">(320) 268-8431</a>
        </div>
      </mat-list-item>

      <mat-list-item>
        <mat-icon matListItemIcon>email</mat-icon>
        <div matListItemTitle>Email</div>
        <div matListItemLine>
          <a mat-button [href]="'mailto:' + companyDetails.email">{{ companyDetails.email }}</a>
        </div>
      </mat-list-item>

      <mat-list-item>
        <mat-icon matListItemIcon>place</mat-icon>
        <div matListItemTitle>Service Area</div>
        <div matListItemLine>
          Twin Ports region: Duluth, Superior, Hermantown, Esko, Proctor, Cloquet
        </div>
      </mat-list-item>
    </mat-list>

    <p>
      Prefer social? Find us on
      <a [href]="companyDetails.socials['facebook']" target="_blank" rel="noopener">Facebook</a> and
      <a [href]="companyDetails.socials['google']" target="_blank" rel="noopener">Google</a>!
    </p>
  </mat-card-content>
</mat-card>
